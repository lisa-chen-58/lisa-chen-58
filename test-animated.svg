<svg fill="none" viewBox="0 0 600 300" width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @keyframes hi  {
            0% { transform: rotate( 0.0deg) }
           10% { transform: rotate(14.0deg) }
           20% { transform: rotate(-8.0deg) }
           30% { transform: rotate(14.0deg) }
           40% { transform: rotate(-4.0deg) }
           50% { transform: rotate(10.0deg) }
           60% { transform: rotate( 0.0deg) }
          100% { transform: rotate( 0.0deg) }
        }

        @keyframes gradient {
          0% {
            background-position: 0% 50%;
          }
          50% {
            background-position: 100% 50%;
          }
          100% {
            background-position: 0% 50%;
          }
        }

        .container {
          --color-main: #5452ee;
          --color-primary: #e73c7e;
          --color-secondary: #23a6d5;
          --color-tertiary: #ffff;

          background: linear-gradient(-45deg, var(--color-main), var(--color-primary), var(--color-secondary), var(--color-tertiary));
          background-size: 400% 400%;
          animation: gradient 15s ease infinite;

          width: 100%;
          height: 300px;

          display: flex;
          justify-content: center;
          align-items: center;
          color: white;

          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
        }

        .hi {
          animation: hi 1.5s linear -0.5s infinite;
          display: inline-block;
          transform-origin: 70% 70%;
        }

        @media (prefers-color-scheme: light) {
          .container {
            --color-main: #F15BB5;
            --color-primary: #24b0ef;
            --color-secondary: #4526f6;
            --color-tertiary: #f6f645;
          }
        }

        @media (prefers-reduced-motion) {
          .container {
            animation: none;
          }

          .hi {
            animation: none;
          }
        }
      </style>

      <div class="container">
        
          <h1 align="center">Welcome</h1>

          <p align="center">
            <a href="https://www.linkedin.com/in/lisahlchen/" target="_blank">
            <img src="https://img.shields.io/badge/linkedin-%230077B5.svg?&style=for-the-badge&logo=linkedin&logoColor=&color=0A66C2" alt="LinkedIn"/>
            </a>
            <a href="https://github.com/lisa-chen-58/" target="_blank">
            <img src="https://img.shields.io/badge/github-%230077B5.svg?&style=for-the-badge&logo=github&logoColor=f5f5f5&color=c9510c" alt="GitHub"/>
            </a>
            <img src="img/banner_brown_wood_minimal.png"
          </p>

          <h1 align="center">About Me</h1>

          I've definitely been granted some unique experiences in life. It took 4 careers to figure out that I ultimately liked learning. Software development has endless possibiltiies with countless opportunities. The key is to keep learning, grow that network, work hard and ultimately, have fun!

          <h1 align="center">Current Projects</h1>

          <p align="center">
            <a href="https://github.com/lisa-chen-58/Career_Detector_Group_Project_Extension/blob/main/README.md" target="_blank">
              <img src="img/Banner_TheNextIteration1.png" alt="TheNextIteration"/>
              </a>
          </p>

          <p align="center"">
          This website represents a Discord server that hosts events and collaborations for developers
          </p>

          <h1 align="center">Past Projects</h1>

          <p align="center">
            <a href="https://github.com/lisa-chen-58/Career_Detector_Group_Project_Extension/blob/main/README.md" target="_blank">
              <img src="img/Button_CareerDetector.png" alt="CareerDetector"/>
              </a>
          </p> 
          <p align="center">
            <a href="https://github.com/lisa-chen-58/Pane_Job_Organizer" target="_blank">
              <img src="img/Button_Pane.png" alt="Pane"/>
              </a>
          </p>

          <h4 align = "center">Pictures were modifed by third-party applications</h4>

          <p align="center">
          <button href="https://imageresizer.com/">Image Resizer</button> | 
          <button href="https://www.canva.com/">Canva</button> |
          <button href="https://pixlr.com/">Pixlr</button> 
          </p>
        
        
        
      </div>
    </div>
  </foreignObject>
</svg>
